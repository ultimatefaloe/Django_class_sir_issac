{% extends 'layout.html'%} 

{% block title%} Posts {% endblock %}
 
{% block main %}
<section>
  <h1 class="text-xl font-bold">Posts</h1>

  {% for post in posts %}
  <article class="border-b border-gray-300 py-4">
   <h1 class="text-lg font-bold">
    <a href="{% url 'posts:post_detail' slug=post.slug %}">
      {{ post.title }}
    </a>
  </h1>
    <p class="text-sm text-gray-500">{{post.date}}</p>
    <p>{{post.body}}</p>
  </article>
  {% endfor %}
</section>

{% endblock %}
